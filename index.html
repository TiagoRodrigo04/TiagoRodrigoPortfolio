<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>My Portfolio</title>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <style>
            body {
                font-family: 'Press Start 2P', monospace;
                background-color: #000000;
                margin: 0;
                padding: 20px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .game-screen {
                border: 10px solid #333;
                padding: 20px;
                background-color: #000;
                box-shadow: 0 0 20px #ff8800;
                max-width: 800px;
                width: 100%;
            }
            h1 {
                text-align: center;
                font-size: 24px;
                margin-bottom: 20px;
                color: rgb(207, 117, 0);
            }
            p {
                font-size: 12px;
                line-height: 15px;
                text-align: justify;
            }

            button {
                display: block;
                margin: 20px auto;
                padding: 10px 20px;
                font-size: 12px;
                background-color: #ff8800;
                color: white;
                border-radius: 8px;
                cursor: pointer;
                font-family: 'Press Start 2P', monospace;
            }
            button:hover {
                background-color: #ff6600;
            }

        </style>
    </head>

    <div class="game-screen">
        <body style="color: rgb(255, 255, 255); background-color: rgb(0, 0, 0);">
            <h1>Tiago Rodrigo Portfolio</h1>
            <p>This is a simple web page created to show some works I have done.</p>
        </body>

        <button onclick="window.location.href='Projects.html';">View Projects</button>
    </div>
    
</html>
